<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGG - AI数学绘图助手</title>
  <link rel="stylesheet" href="chatgg.css">
</head>
<body>
  <div class="container">
    <!-- 侧边栏 -->
    <div class="sidebar">
      <button id="new-chat-btn" class="new-chat-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span class="btn-text">新对话</span>
      </button>
      
      <div class="history-section">
        <h3 class="history-title">历史记录</h3>
        <div id="history-list" class="history-list"></div>
      </div>
      
      <div class="settings-section">
        <button id="settings-btn" class="settings-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          <span class="btn-text">设置</span>
        </button>
      </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="main-content">
      <div class="chat-header">
        <div class="header-controls">
          <button id="toggle-sidebar-btn" class="header-icon-btn" title="切换侧边栏">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
          </button>
          <button id="new-chat-header-btn" class="header-icon-btn" title="新对话">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </button>
        </div>
        <h2 id="chat-title" class="chat-title">新对话</h2>
      </div>
      
      <div id="chat-container" class="chat-container">
        <div class="welcome-message">
          <h3>欢迎使用AI数学绘图助手</h3>
          <p>输入数学作图需求,AI会自动帮你生成GeoGebra命令并绘制图形</p>
          <div class="welcome-examples">
            <button type="button" class="example-tag">画一个等边三角形</button>
            <button type="button" class="example-tag">构造圆的切线</button>
            <button type="button" class="example-tag">证明勾股定理</button>
          </div>
        </div>
      </div>
      
      <div class="image-preview-wrapper" id="image-preview-wrapper">
        <div class="image-preview-container" id="image-preview-container">
          <img id="image-preview" src="" alt="Image preview">
          <button id="close-preview" class="close-preview-btn" title="移除图片">×</button>
        </div>
      </div>
      
      <div class="user-input-container">
        <div class="input-wrapper">
          <textarea id="user-input" placeholder="输入数学作图需求..." rows="2"></textarea>
          <div class="input-actions">
            <button id="image-attachment-btn" class="image-attachment-btn" title="添加图片">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </button>
            <button id="send-btn" class="send-btn" title="发送消息">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <input type="file" id="image-input" accept="image/*" style="display: none;">
  
  <!-- 设置弹窗 -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>设置</h3>
        <button class="modal-close-btn" id="close-settings-btn">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>模型提供方:</label>
          <select id="model-provider">
            <option value="zhipu">智谱</option>
          </select>
        </div>
        <div class="form-group">
          <label>接入端点:</label>
          <input type="text" id="api-endpoint" placeholder="https://open.bigmodel.cn/api/paas/v4">
        </div>
        <div class="form-group">
          <label>API密钥:</label>
          <input type="password" id="api-key" placeholder="请输入API密钥">
        </div>
        <div class="form-group">
          <label>模型名称:</label>
          <input type="text" id="model-name" placeholder="glm-5v-turbo">
        </div>
      </div>
      <div class="modal-footer">
        <button id="save-settings-btn" class="btn-primary">保存设置</button>
      </div>
    </div>
  </div>
  
  <!-- GeoGebra 预加载容器 -->
  <div id="ggb-preload-container" style="position: absolute; left: -9999px; top: -9999px; width: 1px; height: 1px; overflow: hidden;"></div>
  
  <script src="https://cdn.geogebra.org/apps/deployggb.js"></script>
  <script src="ai.js"></script>
  <script src="chatgg.js"></script>
</body>
</html>
