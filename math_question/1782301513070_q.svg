<svg width="550" height="270" xmlns="http://www.w3.org/2000/svg">
  <!-- 仅平移正向缩放，无任何翻转变换，坐标全部手动计算 -->
  <g transform="translate(275, 40) scale(100, 100)">
    <!-- 全部线段（先左右镜像，再垂直翻转后的坐标） -->
    <line x1="0.0" y1="0.0" x2="-0.4142" y2="1.0" stroke="#000" stroke-width="0.03"/>
    <line x1="0.0" y1="0.0" x2="0.4142" y2="1.0" stroke="#000" stroke-width="0.03"/>
    <line x1="0.0" y1="2.0" x2="-0.4142" y2="1.0" stroke="#000" stroke-width="0.03"/>
    <line x1="0.0" y1="2.0" x2="0.4142" y2="1.0" stroke="#000" stroke-width="0.03"/>
    <line x1="0.0" y1="0.0" x2="0.0" y2="2.0" stroke="#000" stroke-width="0.03"/>
    <line x1="0.0" y1="2.0" x2="-0.7071" y2="1.7071" stroke="#000" stroke-width="0.03"/>
    <line x1="0.0" y1="2.0" x2="0.7071" y2="1.7071" stroke="#000" stroke-width="0.03"/>
    <line x1="-0.4142" y1="1.0" x2="-0.7071" y2="1.7071" stroke="#000" stroke-width="0.03"/>
    <line x1="0.4142" y1="1.0" x2="0.7071" y2="1.7071" stroke="#000" stroke-width="0.03"/>

    <!-- 文字标签：取消圆点，全部斜体Roman，P字母向下偏移 -->
    <text x="0.06" y="0.10" font-size="0.13" font-family="Times New Roman" font-style="italic">A</text>
    <text x="0.06" y="2.15" font-size="0.13" font-family="Times New Roman" font-style="italic">P</text>
    <text x="-0.52" y="0.90" font-size="0.13" font-family="Times New Roman" font-style="italic">B</text>
    <text x="0.46" y="0.90" font-size="0.13" font-family="Times New Roman" font-style="italic">C</text>
    <text x="-0.83" y="1.78" font-size="0.13" font-family="Times New Roman" font-style="italic">D</text>
    <text x="0.75" y="1.78" font-size="0.13" font-family="Times New Roman" font-style="italic">E</text>
  </g>
</svg>
