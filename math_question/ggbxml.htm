<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGebra XML 绘图测试 - 初中数学几何题库</title>
    <link rel="stylesheet" href="ggbxml.css">
    <script src="https://cdn.geogebra.org/apps/deployggb.js"></script>
<script src="question_xml.js"></script>
<script>
    MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: {
            fontCache: 'global'
        }
    };
</script>
<script defer src="https://lib.baomitu.com/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>初中数学几何题库</h1>
        <p>选择题目，查看GeoGebra绘图效果</p>
    </div>
    
    <div class="main-content">
        <!-- 左栏：题目列表 -->
        <div class="sidebar">
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">题目总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statLoaded">0</div>
                    <div class="stat-label">已加载</div>
                </div>
            </div>
            
            <div class="category-filter">
                <button class="cat-filter-btn active" data-category="全部">全部</button>
                <button class="cat-filter-btn" data-category="三角形">三角形</button>
                <button class="cat-filter-btn" data-category="四边形">四边形</button>
                <button class="cat-filter-btn" data-category="圆">圆</button>
                <button class="cat-filter-btn" data-category="综合">综合</button>
            </div>
            
            <h2>题目列表</h2>
            <ul class="question-list" id="questionList">
                <li style="padding: 8px; color: #667eea;">加载中...</li>
            </ul>
        </div>
        
        <!-- 中栏：题目内容和XML命令 -->
        <div class="xml-panel">
            <div class="xml-header">
                <h3>题目内容 & XML命令<span id="xmlLength">0 字符</span></h3>
            </div>
            
            <div class="question-title" id="questionTitle">选择一个题目</div>
            
            <div class="question-section">
                <div class="section-header">题目</div>
                <div class="question-content" id="questionContent">点击左侧题目列表选择题目</div>
            </div>
            
            <div class="answer-section">
                <div class="section-header">解答</div>
                <div class="answer-content" id="answerContent">点击左侧题目列表选择题目</div>
            </div>
            
            <div class="xml-actions">
                <button class="btn btn-secondary" id="copyBtn" disabled>复制题目+解答</button>
                <button class="btn btn-secondary" id="clearBtn" disabled>清空画板</button>
                <button class="btn btn-secondary" id="runBtn" disabled>执行 XML</button>
                <button class="btn btn-secondary" id="saveBtn" disabled>保存 XML</button>
            </div>
            
            <textarea id="xmlTextarea" class="xml-textarea" placeholder="GeoGebra XML 命令将显示在这里..."></textarea>
        </div>
        
        <!-- 右栏：GeoGebra画板 -->
        <div class="preview-panel">
            <div class="ggb-wrapper">
                <div id="ggbContainer" class="ggb-container"></div>
                <div class="loading-overlay" id="loadingOverlay">
                    <span class="loading-text">GeoGebra 加载中...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="ggbxml.js"></script>
</body>
</html>
