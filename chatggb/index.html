<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>ChatGGB - AI几何绘图助手</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <link rel="stylesheet" href="chat-ggb.css"/>
</head>
<body>
  <div class="container">
    <!-- 左侧边栏 -->
    <div class="sidebar">
      <!-- 新建对话按钮 -->
      <button id="new-chat-btn" class="new-chat-btn">
        <span class="btn-icon">+</span>
        <span class="btn-text">新对话</span>
      </button>
      
      <!-- 历史记录列表 -->
      <div class="history-section">
        <h3 class="history-title">历史记录</h3>
        <div id="history-list" class="history-list">
          <!-- 动态生成历史项 -->
        </div>
      </div>
      
      <!-- 设置区域 -->
      <div class="settings-section">
        <button id="settings-btn" class="settings-btn">
          <span class="btn-icon">⚙️</span>
          <span class="btn-text">设置</span>
        </button>
      </div>
    </div>
    
    <!-- 设置面板（覆盖层） -->
    <div id="settings-panel" class="settings-panel">
      <div class="settings-content">
        <div class="settings-header">
          <h3>设置</h3>
          <button id="close-settings" class="close-settings-btn">✕</button>
        </div>
        
        <div class="provider-section">
          <h4>模型配置</h4>
          <div class="provider-input-section">
            <label for="provider-name">模型供应方:</label>
            <input type="text" id="provider-name" class="provider-input" placeholder="例如: OpenRouter, 智谱AI, NVIDIA Build">
          </div>
          
          <div class="endpoint-section">
            <label for="api-endpoint">接入端点:</label>
            <input type="text" id="api-endpoint" class="endpoint-input" placeholder="例如: https://openrouter.ai/api/v1">
          </div>
          
          <div class="api-key-section">
            <label for="api-key">API密钥:</label>
            <input type="password" id="api-key" class="api-key-input" placeholder="请输入API密钥">
          </div>
          
          <div class="model-name-section">
            <label for="model-name">模型名称:</label>
            <input type="text" id="model-name" class="model-name-input" placeholder="例如: meta-llama/llama-3.3-70b-instruct:free">
          </div>
        </div>
        <button id="save-settings" class="save-settings-btn">保存设置</button>
      </div>
    </div>
    
    <!-- 右侧主内容区 -->
    <div class="main-content">
      <!-- 聊天头部 -->
      <div class="chat-header">
        <h2 id="chat-title" class="chat-title">新对话</h2>
      </div>
      
      <!-- 聊天内容区 -->
      <div id="chat-container" class="chat-container">
        <!-- 欢迎消息 -->
        <div class="welcome-message">
          <div class="welcome-icon">🎨</div>
          <h3>欢迎使用AI几何绘图助手</h3>
          <p>输入几何作图需求，AI会自动帮你生成GeoGebra命令并绘制图形</p>
          <div class="welcome-examples">
            <span class="example-tag">画一个等边三角形</span>
            <span class="example-tag">构造圆的切线</span>
            <span class="example-tag">证明勾股定理</span>
          </div>
        </div>
      </div>
      
      <!-- 图片预览 -->
      <div class="image-preview-wrapper">
        <div class="image-preview-container" id="image-preview-container">
          <img id="image-preview" src="" alt="Image preview">
          <button id="close-preview" class="close-preview-btn" title="移除图片">×</button>
        </div>
      </div>
      
      <!-- 输入区域 -->
      <div class="user-input-container">
        <div class="input-wrapper">
          <textarea id="user-input" placeholder="输入几何作图需求..." rows="2"></textarea>
          <div class="input-actions">
            <button id="image-attachment-btn" class="image-attachment-btn" title="添加图片"></button>
            <button id="send-btn" class="send-btn" title="发送消息">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 2H12l-5.5 11L2 9l9 5.5L22 2z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 隐藏的预加载画板容器 -->
  <div id="ggb-preload-container" style="display: none;">
    <div id="ggb-preload" style="width: 100px; height: 100px;"></div>
  </div>
  
  <!-- 动态加载脚本 -->
  <script src="ai-manager.js"></script>
  <script src="chat-ggb.js"></script>
</body>
</html>
